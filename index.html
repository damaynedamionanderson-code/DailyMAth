<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math App - Introduction</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<style>
:root {
--ucla-blue: #2774AE;
--ucla-gold: #FFD100;
--dark-blue: #003B5C;
--white: #FFFFFF;
}
body {
background-color: var(--white);
font-family: 'Inter', sans-serif;
margin: 0;
display: flex;
align-items: center;
justify-content: center;
min-height: 100svh;
overflow-x: hidden;
overflow-y: auto;
padding: 18px 14px;
color: var(--dark-blue);
}
.intro-container { text-align: center; max-width: 800px; width: min(100%, 800px); }
.intro-title {
font-size: clamp(2rem, 9vw, 3.5rem);
letter-spacing: 0.2em;
color: var(--ucla-blue);
opacity: 0; /* Hidden for animation */
margin: 0;
}
.divider {
width: 0%; height: 3px;
background: var(--ucla-gold);
margin: 20px auto;
}
.intro-text {
font-size: 1.2rem;
color: var(--dark-blue);
opacity: 0; /* Hidden for animation */
margin-bottom: 30px;
}
.intro-btn {
display: inline-block;
padding: 12px 30px;
margin: 10px;
text-decoration: none;
border-radius: 50px;
font-weight: 800;
opacity: 0; /* Hidden for animation */
transform: translateY(20px);
}
.main { background: var(--ucla-gold); color: var(--dark-blue); }
.discord { border: 2px solid var(--ucla-blue); color: var(--ucla-blue); }
@media (max-width: 700px) {
.intro-title {
letter-spacing: 0.1em;
}
.intro-text {
font-size: 1rem;
margin-bottom: 18px;
}
.intro-btn {
width: min(280px, 92vw);
margin: 6px auto;
display: block;
}
}
</style>
</head>
<body>
<div class="intro-container">
<h1 class="intro-title">DAILY MATH APP</h1>
<div class="divider"></div>
<p class="intro-text">A BRAND NEW APP!!</p>
<div class="button-group">
<a href="" class="intro-btn main">Explore App</a>
<a href="https://discord.gg/kW5f4cbyU" target="_blank" rel="noopener noreferrer" class="intro-btn discord">Discord</a>
</div>
</div>
<script src="./Intro.js"></script>
</body>
</html>
