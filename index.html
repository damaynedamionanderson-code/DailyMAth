<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daily-Math | Update</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --brand-blue: #005596;
            --text-main: #1d1d1f;
            --text-secondary: #6e6e73;
            --bg-light: #f5f5f7;
            --success-green: #0f9d58;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-light);
            background-image: radial-gradient(#d2d2d7 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100svh;
            padding: 20px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            padding: 48px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            max-width: 580px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(0, 85, 150, 0.08);
            color: var(--brand-blue);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.6rem);
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -1px;
        }

        .description {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .timer-wrap {
            background: #ffffff;
            border: 1px solid #e1e8f0;
            border-radius: 16px;
            padding: 24px 16px;
            margin: 0 auto 10px;
            max-width: 440px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .timer-active {
            animation: timerPulse 2.5s infinite ease-in-out;
        }

        .timer-label {
            font-size: 0.75rem;
            color: #8e8e93;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .timer-value {
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            font-weight: 800;
            color: var(--brand-blue);
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', Courier, monospace;
            transition: color 0.5s ease;
        }

        .launch-date-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background-color: var(--brand-blue);
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #003b69;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 85, 150, 0.25);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid #d2d2d7;
        }

        .btn-secondary:hover {
            background-color: #ffffff;
            border-color: var(--brand-blue);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 12px;
            color: #a1a1a6;
        }

        /* Success State Overrides */
        .finished .status-badge {
            background-color: rgba(15, 157, 88, 0.15);
            color: var(--success-green);
            transform: scale(1.1);
        }

        .finished .timer-wrap {
            border-color: var(--success-green);
            background-color: #f0fff4;
            transform: translateY(-5px);
        }

        .finished .timer-value {
            color: var(--success-green);
            letter-spacing: 2px;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes timerPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 10px 30px rgba(0, 85, 150, 0.1); }
            100% { transform: scale(1); }
        }

        #launchTarget {
            font-weight: 700;
            color: var(--brand-blue);
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="statusBadge" class="status-badge">Processing Equations</div>
    <h1 id="pageTitle">Maintenance in Progress</h1>
    <p id="pageDescription" class="description">
        We are calculating a superior learning experience. daily-Math will be back online soon.
    </p>

    <div id="timerWrap" class="timer-wrap timer-active">
        <div class="timer-label" id="timerLabel">System Reboot in</div>
        <div id="timerValue" class="timer-value">Loading...</div>
    </div>
    
    <div class="launch-date-text">
        Target Launch: <span id="launchTarget">March 28, 2026 @ 3:00 PM</span>
    </div>

    <div class="button-group">
        <a href="https://discord.gg/kW5f4cbyU" class="btn btn-primary">Join Discord</a>
        <a href="https://daily-math.org/AboutMe.html" class="btn btn-secondary">About Me</a>
    </div>

    <div class="footer-note">&copy; 2026 daily-Math</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
    /**
     * TARGET CALCULATION
     * Current Time: March 7, 2026, 3:34 PM
     * + 500 Hours = March 28, 2026, 3:34 PM
     */
    const targetDate = new Date("March 28, 2026 15:34:00").getTime();

    // Set the text in the UI for the user to see the exact date
    document.getElementById("launchTarget").innerText = new Date(targetDate).toLocaleString([], { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric', 
        hour: '2-digit', 
        minute: '2-digit'
    });

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
            clearInterval(timerInterval);
            triggerLaunch();
            return;
        }

        // Standard time math
        const hours = Math.floor(distance / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Leading zeros formatting
        const hDisp = hours.toString().padStart(2, '0');
        const mDisp = minutes.toString().padStart(2, '0');
        const sDisp = seconds.toString().padStart(2, '0');

        document.getElementById("timerValue").innerHTML = `${hDisp}:${mDisp}:${sDisp}`;
    }

    function triggerLaunch() {
        // Change UI Elements
        document.getElementById("statusBadge").innerHTML = "System Online";
        document.getElementById("pageTitle").innerHTML = "Deployment Complete";
        document.getElementById("pageDescription").innerHTML = "The solution has been found. Welcome back to the main site.";
        document.getElementById("timerLabel").innerHTML = "Status";
        document.getElementById("timerValue").innerHTML = "SITE IS UP";
        
        document.getElementById("mainContainer").classList.add("finished");
        document.getElementById("timerWrap").classList.remove("timer-active");

        // Continuous Confetti School!
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
          return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
          var timeLeft = animationEnd - Date.now();

          if (timeLeft <= 0) {
            return clearInterval(interval);
          }

          var particleCount = 50 * (timeLeft / duration);
          // since particles fall down, start a bit higher than random
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }

    const timerInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
