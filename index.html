<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
:root {
--brand-blue: #005596;
--text-main: #1d1d1f;
--text-secondary: #6e6e73;
--bg-light: #f5f5f7;
--success-green: #0f9d58;
}

* {
box-sizing: border-box;
}

body {
background-color: var(--bg-light);
background-image: radial-gradient(#d2d2d7 0.5px, transparent 0.5px);
background-size: 20px 20px;
font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
margin: 0;
display: flex;
justify-content: center;
align-items: center;
min-height: 100svh;
padding: 20px;
color: var(--text-main);
}

.container {
background-color: rgba(255, 255, 255, 0.9);
backdrop-filter: blur(10px);
padding: 48px;
border-radius: 24px;
text-align: center;
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
max-width: 560px;
width: 100%;
border: 1px solid rgba(255, 255, 255, 0.3);
animation: fadeIn 0.8s ease-out;
}

.status-badge {
display: inline-flex;
align-items: center;
background-color: rgba(0, 85, 150, 0.08);
color: var(--brand-blue);
padding: 8px 18px;
border-radius: 30px;
font-size: 13px;
font-weight: 600;
margin-bottom: 24px;
letter-spacing: 0.3px;
text-transform: uppercase;
}

h1 {
font-size: clamp(2rem, 4vw, 2.4rem);
font-weight: 700;
margin: 0 0 12px 0;
letter-spacing: -0.8px;
}

.description {
color: var(--text-secondary);
font-size: 16px;
line-height: 1.6;
margin-bottom: 22px;
}

.timer-wrap {
background: #f9fbff;
border: 1px solid #d6e4f1;
border-radius: 14px;
padding: 14px 16px;
margin: 0 auto 28px;
max-width: 420px;
}

.timer-label {
font-size: 0.82rem;
color: #4f6478;
letter-spacing: 0.07em;
text-transform: uppercase;
margin-bottom: 6px;
}

.timer-value {
font-size: clamp(1.3rem, 4vw, 1.8rem);
font-weight: 700;
color: var(--brand-blue);
font-variant-numeric: tabular-nums;
}

.button-group {
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
}

.btn {
padding: 12px 28px;
border-radius: 10px;
font-size: 14px;
font-weight: 600;
text-decoration: none;
transition: all 0.2s ease;
}

.btn-primary {
background-color: var(--brand-blue);
color: #fff;
}

.btn-primary:hover {
background-color: #003b69;
box-shadow: 0 4px 12px rgba(0, 85, 150, 0.2);
}

.btn-secondary {
background-color: transparent;
color: var(--text-main);
border: 1px solid #d2d2d7;
}

.btn-secondary:hover {
background-color: #f5f5f7;
}

.footer-note {
margin-top: 40px;
font-size: 12px;
color: #a1a1a6;
letter-spacing: 0.2px;
}

.hidden {
display: none;
}

.finished-badge {
background-color: rgba(15, 157, 88, 0.12);
color: var(--success-green);
}

.finished-title {
color: var(--success-green);
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="container">
<div id="statusBadge" class="status-badge">Rebuilding the Experience</div>
<h1 id="pageTitle">Undergoing Maintenance</h1>
<p id="pageDescription" class="description">
We are currently refining our digital workspace to better serve you. The site will return shortly with improved performance and a fresh look.
</p>

<div id="timerWrap" class="timer-wrap">
<div class="timer-label">Time Remaining</div>
<div id="timerValue" class="timer-value">255:00:00</div>
</div>

<div class="button-group">
<a href="https://discord.gg/kW5f4cbyU" class="btn btn-primary">Join Discord</a>
<a href="https://daily-math.org/AboutMe.html" class="btn btn-secondary">About Me</a>
</div>

<div class="footer-note">&copy; 2026 Daily-math</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
const TOTAL_HOURS = 255;
const TOTAL_MS = TOTAL_HOURS * 60 * 60 * 1000;
const STORAGE_KEY = "dailyMathUpdateStartMs";

const statusBadge = document.getElementById("statusBadge");
const pageTitle = document.getElementById("pageTitle");
const pageDescription = document.getElementById("pageDescription");
const timerWrap = document.getElementById("timerWrap");
const timerValue = document.getElementById("timerValue");

function getOrCreateStartTime() {
const existing = Number(localStorage.getItem(STORAGE_KEY));
if (Number.isFinite(existing) && existing > 0) return existing;
const now = Date.now();
localStorage.setItem(STORAGE_KEY, String(now));
return now;
}

function formatRemaining(ms) {
const totalSeconds = Math.max(0, Math.floor(ms / 1000));
const hours = Math.floor(totalSeconds / 3600);
const minutes = Math.floor((totalSeconds % 3600) / 60);
const seconds = totalSeconds % 60;
return String(hours).padStart(3, "0") + ":" +
String(minutes).padStart(2, "0") + ":" +
String(seconds).padStart(2, "0");
}

function fireConfetti() {
if (typeof confetti !== "function") return;
const count = 260;
const defaults = { origin: { y: 0.7 } };
function shoot(ratio, opts) {
confetti(Object.assign({}, defaults, opts, {
particleCount: Math.floor(count * ratio)
}));
}
shoot(0.25, { spread: 30, startVelocity: 55 });
shoot(0.2, { spread: 60 });
shoot(0.35, { spread: 100, decay: 0.91, scalar: 0.9 });
shoot(0.2, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
}

function showFinishedState() {
statusBadge.textContent = "Build Complete";
statusBadge.classList.add("finished-badge");
pageTitle.textContent = "Site Is Finished";
pageTitle.classList.add("finished-title");
pageDescription.textContent = "The countdown has ended. The site is ready.";
timerWrap.classList.add("hidden");
fireConfetti();
}

const startTime = getOrCreateStartTime();
let finished = false;

function tick() {
if (finished) return;
const now = Date.now();
const elapsed = now - startTime;
const remaining = TOTAL_MS - elapsed;

if (remaining <= 0) {
timerValue.textContent = "000:00:00";
finished = true;
showFinishedState();
return;
}
timerValue.textContent = formatRemaining(remaining);
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
